<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure BeefHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Pure BeefHub</h1>
        <p>Fresh cuts, full flavor.</p>
    </header>

    <section class="products">
        <h2>Our Beef Cuts</h2>

        <div class="product">
            <h3>Ribeye Steak</h3>
            <p>Premium tender cut</p>
            <button onclick="order('Ribeye Steak')">Order</button>
        </div>

        <div class="product">
            <h3>Minced Beef</h3>
            <p>Perfect for everyday meals</p>
            <button onclick="order('Minced Beef')">Order</button>
        </div>

        <div class="product">
            <h3>Oxtail</h3>
            <p>Great for soups and stews</p>
            <button onclick="order('Oxtail')">Order</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
